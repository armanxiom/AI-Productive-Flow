kind = "mobile"
previewPath = "/"
title = "Ideaso"
version = "1.0.0"
id = "artifacts/ideaso"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25351

[services.development]
run = "pnpm --filter @workspace/ideaso run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ideaso", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ideaso", "run", "serve" ]

[services.env]
PORT = "25351"
BASE_PATH = "/"
